{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Applications</h2>

<table class="table table-striped table-hover shadow">

    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Company</th>
            <th>Position</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
        {% for app in applications %}
        <tr>
            <td>{{ app[0] }}</td>
            <td>{{ app[1] }}</td>
            <td>{{ app[2] }}</td>
            <td>{{ app[3] }}</td>

            <td>
                <a href="/delete/{{ app[0] }}" class="btn btn-danger btn-sm">
                    Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>

</table>

{% endblock %}
